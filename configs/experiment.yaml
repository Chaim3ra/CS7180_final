model:
  d_model: 128
  nhead: 4
  num_layers: 2
  dropout: 0.1

  encoders:
    weather:
      # GHI, DNI, DHI, temperature, wind_speed, humidity
      input_dim: 6
      ffn_dim: 256
    generation:
      # past kWh readings (univariate)
      input_dim: 1
      ffn_dim: 256
    metadata:
      # lat, lon, tilt_deg, azimuth_deg, capacity_kw, elevation_m
      input_dim: 6
      hidden_dim: 64

  fusion:
    # cross-attention heads (must divide d_model evenly)
    nhead: 4

  head:
    hidden_dim: 128
    # number of 15-min intervals to predict
    forecast_horizon: 4

data:
  # Preprocessed parquet files produced by src/preprocess.py
  # Run: python src/preprocess.py   (skips if files exist; --force to reprocess)
  train_tx_parquet: data/processed/train_tx.parquet   # 19 TX homes, 2018
  train_ca_parquet: data/processed/train_ca.parquet   # 1 CA home (dataid 9836), 2014-2015
  test_ny_parquet:  data/processed/test_ny.parquet    # 14 NY homes, 2019 (zero-shot)

  # Training split applied within TX+CA combined rows (NY is always held out)
  train_frac: 0.85    # 85% of TX+CA rows -> train
  val_frac:   0.15    # 15% of TX+CA rows -> val

  # Column names in the processed parquet files
  weather_cols: [GHI_W_m2, DNI_W_m2, DHI_W_m2, Temp_C, WindSpeed_m_s, RelHumidity_pct]
  solar_col: solar_kwh
  metadata_cols: [lat, lon, tilt_deg, azimuth_deg, capacity_kw, elevation_m]

  # Sliding-window parameters (15-min resolution)
  seq_len: 96           # context window = 24 h
  forecast_horizon: 4   # prediction horizon = 1 h

  batch_size: 32
  num_workers: 0

  # Data provenance (informational)
  regions:
    tx:
      homes: 19
      year: 2018
      source: Pecan Street Dataport (Austin)
      weather: NASA POWER austin 2018
      split: train
    ca:
      homes: 1          # dataid 9836 only; 3 others had all-zero solar (filtered)
      years: [2014, 2015]
      source: Pecan Street Dataport (San Diego)
      weather: NASA POWER california 2014+2015
      split: train
      note: >
        62 additional CA pv=yes homes exist in metadata but were absent from
        the Dataport export. See data/README.md for details.
    ny:
      homes: 14
      year: 2019
      source: Pecan Street Dataport (New York)
      weather: NASA POWER newyork 2019
      split: test_zero_shot

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 50
  # cosine | step | none
  scheduler: cosine

trainer:
  max_epochs: 50
  accelerator: auto
  devices: 1
  # 32-true (full float32) | 16-mixed (AMP) | bf16-mixed
  precision: 32-true
  log_every_n_steps: 10
  val_check_interval: 1.0
  gradient_clip_val: 1.0
  enable_progress_bar: true
  enable_model_summary: true
  default_root_dir: logs/
